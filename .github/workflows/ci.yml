name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      NEXT_PUBLIC_APP_ORIGIN: https://feedbacks.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm widget:check-size

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_ORIGIN: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      E2E_AUTH_BYPASS_SECRET: ${{ secrets.E2E_AUTH_BYPASS_SECRET }}
      PLAYWRIGHT_TEST_EMAIL: playwright@feedbacks.dev
      PLAYWRIGHT_TEST_PASSWORD: Playwright!12345
    steps:
      - name: Check E2E secret availability
        id: e2e-secrets
        shell: bash
        run: |
          missing=()
          for name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY E2E_AUTH_BYPASS_SECRET; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'ready=false\n' >> "$GITHUB_OUTPUT"
            printf 'Missing E2E secrets: %s\n' "${missing[*]}"
            exit 0
          fi

          printf 'ready=true\n' >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.e2e-secrets.outputs.ready == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.e2e-secrets.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.e2e-secrets.outputs.ready == 'true'
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.e2e-secrets.outputs.ready == 'true'
      - run: pnpm exec playwright install --with-deps chromium
        if: steps.e2e-secrets.outputs.ready == 'true'
      - run: pnpm exec playwright test packages/dashboard/tests/e2e --project=chromium
        if: steps.e2e-secrets.outputs.ready == 'true'
      - name: Skip E2E when secrets are unavailable
        if: steps.e2e-secrets.outputs.ready != 'true'
        run: echo "Skipping Playwright E2E because the required Supabase/E2E secrets are not configured."
